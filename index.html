<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#01696f" />
  <title>C10 Parts & Cost Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="app-header">
    <div>
      <p class="eyebrow">Private parts tracker</p>
      <h1>1984 Chevy C10</h1>
      <p class="subtitle">Simple parts and cost tracker for the C10 build.</p>
    </div>
    <div class="header-actions">
      <div class="phase-pill">Parts & Costs</div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme">◐</button>
    </div>
  </header>

  <main id="main-content" class="main-grid">
    <div class="stats-grid">
      <article class="stat-card"><span>Total spent</span><strong id="total-spent">$0</strong></article>
      <article class="stat-card"><span>Parts tracked</span><strong id="parts-count">0</strong></article>
      <article class="stat-card"><span>Installed</span><strong id="installed-count">0</strong></article>
      <article class="stat-card"><span>Bought / planned</span><strong id="planned-count">0</strong></article>
    </div>

    <div class="content-grid two-col section-gap">
      <article class="panel">
        <div class="panel-head"><h2>Add part</h2></div>
        <form id="part-form" class="app-form">
          <label>Part name<input type="text" name="name" required /></label>
          <label>Category<input type="text" name="category" required /></label>
          <label>Status<select name="status" required><option>Planned</option><option>Bought</option><option>Received</option><option>Installed</option></select></label>
          <label>Vendor<input type="text" name="vendor" required /></label>
          <label>Price<input type="number" name="price" step="0.01" min="0" required /></label>
          <button type="submit" class="primary-button">Add part</button>
        </form>
      </article>

      <article class="panel">
        <div class="panel-head"><h2>Category totals</h2></div>
        <ul id="category-totals" class="stack-list"></ul>
      </article>
    </div>

    <article class="panel">
      <div class="panel-head"><h2>Parts & costs</h2></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Part</th>
              <th>Category</th>
              <th>Status</th>
              <th>Vendor</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="parts-table"></tbody>
        </table>
      </div>
    </article>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
